[env]
mode = "dev"

[logging]
level = "debug"
format = "pretty"
request_id = true
redact_headers = ["authorization", "proxy-authorization", "cookie", "set-cookie"]

[time]
timezone = "America/Mexico_City"

[caching]
enabled = true
ttl_seconds = 300
max_entries = 1024
cache_channel_capacity_chunks = 64
cache_max_object_size_bytes = 1073741824
cache_require_content_length = true
cache_writer_delay_ms = 0

[limits]
max_header_bytes = 32768
max_connections = 1024
per_ip_rps = 50
connect_timeout_ms = 5000
idle_timeout_ms = 60000

[policy]
allowed_domains = ["*"]
denied_domains = []
allowed_ports = [80, 443]
denied_ports = []

[listen]
host = "127.0.0.1"
port = 3128
